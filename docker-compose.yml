services:

  oltp:
    image: postgres
    environment:
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    ports:
      - $POSTGRES_PORT:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", $POSTGRES_DB]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
  generator:
    build:
      context: .
      dockerfile: ./generator/Dockerfile
    volumes:
      - ./shared:/shared
    environment:
      POSTGRES_HOST: oltp
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: 5432
    depends_on:
      oltp:
        condition: service_healthy
  bruin:
    build:
      context: .
      dockerfile: ./bruin/Dockerfile
    volumes:
      - ./shared:/shared
      - ./bruin:/bruin
    environment:
      DUCKDB_FILE_PATH: /shared/db/datamart.duckdb
      POSTGRES_HOST: oltp
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: 5432
    depends_on:
      generator:
          condition: service_completed_successfully
      oltp:
          condition: service_healthy          
  superset:
    build:
      context: .
      dockerfile: ./superset/Dockerfile
      args:
        SUPERSET_ADMIN: ${SUPERSET_ADMIN}
        SUPERSET_PASSWORD: ${SUPERSET_PASSWORD}
        SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    ports:
        - "8088:8088"
    command:     gunicorn --bind  "0.0.0.0:8088" --access-logfile '-' --error-logfile '-' --workers 1 --worker-class gthread --threads 20 --timeout 60 --limit-request-line 0 --limit-request-field_size 0 "superset.app:create_app()"
    post_start:
      - command: "superset import-dashboards -p ./dashboard.zip -u ${SUPERSET_ADMIN}"
    volumes:
        - ./shared/db:/app/superset_home/db
    depends_on:
      - bruin