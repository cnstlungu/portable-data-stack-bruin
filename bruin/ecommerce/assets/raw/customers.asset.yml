name: raw.customers
type: ingestr
parameters:
  destination: duckdb
  source_connection: oltp
  source_table: public.customers
  incremental_strategy: merge

columns:
  - name: id
    type: varchar
    primary_key: true
    description: "Unique customer identifier"
  - name: email
    type: varchar
    description: "Customer email address"
  - name: name
    type: varchar
